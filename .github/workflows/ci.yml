name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extensions/vscode-copilot/package-lock.json

      - name: Install & build root plugin
        run: npm ci && npm run build

      - name: Install extension deps
        working-directory: extensions/vscode-copilot
        run: npm ci

      - name: Build catalog + extension
        working-directory: extensions/vscode-copilot
        run: npm run prepare

      - name: Run extension tests
        working-directory: extensions/vscode-copilot
        run: npm test
